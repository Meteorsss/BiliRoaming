name: Manual APK Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: APK build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
          - both

permissions:
  contents: read

jobs:
  build-apk:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: true
      CCACHE_MAXSIZE: 1G

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865" \
            "cmake;4.1.0"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}

      - name: Prepare version
        run: echo "VERSION=${GITHUB_SHA::10}" >> "$GITHUB_ENV"

      - name: Write signing key when available
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "Writing Android signing key"
            echo "releaseStorePassword=$KEY_STORE_PASSWORD" >> gradle.properties
            echo "releaseKeyAlias=$KEY_ALIAS" >> gradle.properties
            echo "releaseKeyPassword=$KEY_PASSWORD" >> gradle.properties
            echo "releaseStoreFile=key.jks" >> gradle.properties
            echo "$SIGNING_KEY" | base64 --decode > key.jks
          else
            echo "SIGNING_KEY is not set; release APK may be unsigned."
          fi

      - name: Build APK
        run: |
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          echo 'android.native.buildOutput=verbose' >> gradle.properties
          chmod +x ./gradlew

          case "${{ inputs.build_type }}" in
            debug)
              ./gradlew -PappVerName="$VERSION" assembleDebug
              ;;
            release)
              ./gradlew -PappVerName="$VERSION" assembleRelease
              ;;
            both)
              ./gradlew -PappVerName="$VERSION" assembleDebug assembleRelease
              ;;
          esac

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliRoaming-${{ inputs.build_type }}-${{ env.VERSION }}
          if-no-files-found: error
          path: |
            app/build/outputs/apk/**/*.apk
            app/release/*.apk
            app/build/outputs/mapping/**

